<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events - Hopeful Hearts</title>
  <meta name="description" content="Events for Hopeful Hearts Orphanage" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="events.css" />
  
  <!-- Leaflet CSS for Maps -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<body>
  <!-- Header / Navbar -->
  <header class="site-header">
    <div class="brand">
      <button class="hamburger-menu-toggle" id="hamburgerToggleBtn" aria-label="Toggle Navigation" style="margin-right: 8px;">
        <span></span><span></span><span></span>
      </button>
      <img src="logo.png" alt="Hopeful Hearts logo" class="brand-logo" />
      <span class="brand-name">Hopeful Hearts Orphanage</span>
    </div>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="index.html#about">About</a>
      <a href="index.html#contact">Contact</a>
      <a href="events.html">Events</a>
      <a href="admin/admin.html" id="dashboardLink" style="display:none;">Dashboard</a>
    </nav>
    <div id="authButtons">
      <a href="login.html" class="btn btn-outline">Sign In</a>
      <a href="signup.html" class="btn btn-primary">Join Us</a>
    </div>
    <div id="userMenu" style="display:none; align-items:center; gap:12px;">
      <span id="userNameDisplay" style="font-weight:500; color:#0f172a;"></span>
      <button id="logoutBtn" class="btn btn-outline" style="padding:6px 14px; font-size:0.85rem; cursor:pointer;">Logout</button>
    </div>
  </header>

  <!-- Main Container -->
  <main class="event-details-main">
    
    <div class="events-controls" style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 24px; padding-top: 24px; flex-wrap: wrap; gap: 16px;">
      <div class="events-search-filter" style="display: flex; gap: 16px; width: 100%;">
        <input type="text" id="searchEvent" placeholder="Search events..." style="flex-grow: 1; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05);"/>
        <select id="filterCategory" style="padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; background-color: #fff; cursor: pointer; min-width: 200px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
          <option value="">All Categories</option>
          <option value="Fundraiser">Fundraiser</option>
          <option value="Volunteer">Volunteer Day</option>
          <option value="Social">Social / Celebration</option>
          <option value="Workshop">Workshop</option>
        </select>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="events-page-layout" style="display: flex; gap: 40px; align-items: flex-start; margin-top: 24px; color: #000; flex-wrap: wrap;">
      
      <!-- Left: Embedded Events List -->
      <div class="embedded-events-list" style="flex: 1; min-width: 600px;">
        <div class="events-grid" id="upcomingEventsGrid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;">
          <div class="loading-text" style="color:#000;">Loading upcoming events...</div>
        </div>
      </div>
      
      <!-- Right: Sidebar -->
      <aside class="event-sidebar" id="globalEventSidebar" style="width: 390px; position: sticky; top: 24px; display: none; color: #000;">
        <!-- Interactive Map -->
        <div class="sidebar-card map-card" style="color: #000;">
          <h3 style="color: #000;">Event Location</h3>
          <div id="eventMap" class="leaflet-map-container" style="height: 250px; border-radius: 12px; margin-bottom: 16px; z-index: 1;"></div>
          <div class="map-actions">
            <a href="#" id="googleMapsLink" target="_blank" class="btn btn-outline btn-block" style="color:#000; border-color: #000;">Open in Google Maps</a>
          </div>
        </div>
      </aside>
    </div>
    
  </main>

  <footer class="site-footer">
    <!-- Footer content omitted for brevity, same as events.html -->
    <div class="footer-inner">
      <div class="footer-brand">
        <p>© 2026 Hopeful Hearts Orphanage</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
      }
    }
  </script>
  
  <!-- Add FontAwesome for icons in details -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  
  <div id="copyToast" class="copy-toast"><i class="fa-solid fa-check"></i> Event link copied!</div>
  
  <script type="module" src="events.js"></script>
</body>
</html>
