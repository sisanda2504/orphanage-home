<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donate - Hopeful Hearts</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .donate-container {
      max-width: 500px;
      margin: 40px auto;
      padding: 32px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      background: #fff;
    }
    .donate-container h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .donate-container .subtitle { color: #64748b; margin-bottom: 24px; }
    
    .balance-display {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      padding: 20px 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .balance-display .label { font-size: 0.9rem; opacity: 0.9; }
    .balance-display .amount { font-size: 1.8rem; font-weight: 700; }
    .balance-display .link { 
      color: white; 
      font-size: 0.85rem; 
      opacity: 0.8; 
      text-decoration: underline;
      cursor: pointer;
    }
    .balance-display .link:hover { opacity: 1; }

    .amount-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .amount-btn {
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.2s;
    }
    .amount-btn:hover { border-color: #f97316; background: #fff7ed; }
    .amount-btn.selected { border-color: #f97316; background: #fff7ed; color: #f97316; }
    .amount-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 4px; color: #0f172a; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: 2px solid #f97316;
      border-color: transparent;
    }

    .btn-block { width: 100%; padding: 12px; margin-top: 8px; }
    .btn-block:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success-message { 
      color: #22c55e; 
      font-size: 0.95rem; 
      margin-top: 8px; 
      padding: 12px;
      background: #f0fdf4;
      border-radius: 8px;
      display: none;
    }
    .error-message {
      color: #ef4444;
      font-size: 0.95rem;
      margin-top: 8px;
      padding: 12px;
      background: #fef2f2;
      border-radius: 8px;
      display: none;
    }

    .auth-required {
      text-align: center;
      padding: 40px;
      background: #f8fafc;
      border-radius: 12px;
    }
    .auth-required h2 { margin-bottom: 12px; }
    .auth-required .btn-group { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }

    .loading-spinner {
      display: none;
      text-align: center;
      margin-top: 12px;
      color: #64748b;
    }
    .loading-spinner.active { display: block; }

    .insufficient-funds {
      color: #ef4444;
      font-size: 0.9rem;
      margin-top: 8px;
      padding: 8px 12px;
      background: #fef2f2;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="donate-container" id="donateContainer">
    <!-- Will be populated by JavaScript -->
  </div>

  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
      }
    }
  </script>

  <script type="module">
    import { createClient } from '@supabase/supabase-js'

    const supabaseUrl = 'https://irzqdsxdiifosqzqdypj.supabase.co'
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyenFkc3hkaWlmb3NxenFkeXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTgwMjYsImV4cCI6MjA5ODk5NDAyNn0.2mzC2WjiVIN2imGfKh0aKhdP97PCT6eLsTxOS4lfbh0'
    const supabase = createClient(supabaseUrl, supabaseAnonKey)

    const container = document.getElementById('donateContainer')
    let currentUser = null
    let currentBalance = 0
    let totalDonated = 0
    let donationCount = 0

    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser()
      
      if (user) {
        currentUser = user
        await loadData(user.id)
        renderDonationForm()
      } else {
        renderAuthRequired()
      }
    }

    async function loadData(userId) {
      try {
        // Get user profile (total_donated should only count donations, not deposits)
        const { data: profile } = await supabase
          .from('users')
          .select('total_donated, donation_count')
          .eq('id', userId)
          .single()
        
        totalDonated = profile?.total_donated || 0
        donationCount = profile?.donation_count || 0

        // Get balance
        const { data: balanceData } = await supabase
          .from('balances')
          .select('balance')
          .eq('user_id', userId)
          .single()
        
        currentBalance = balanceData?.balance || 0
        
      } catch (error) {
        console.error('Error loading data:', error)
      }
    }

    function renderAuthRequired() {
      container.innerHTML = `
        <div class="auth-required">
          <h2>Sign In Required</h2>
          <p style="color: #64748b; margin-bottom: 8px;">
            Please sign in or create an account to make a donation.
          </p>
          <div class="btn-group">
            <a href="login.html?return=donate.html" class="btn btn-primary">Sign In</a>
            <a href="signup.html?return=donate.html" class="btn btn-outline">Create Account</a>
          </div>
          <div style="margin-top: 20px;">
            <a href="index.html" style="color: #64748b; font-size: 0.9rem;">← Back to Home</a>
          </div>
        </div>
      `
    }

    function renderDonationForm() {
      container.innerHTML = `
        <h1>Make a Donation</h1>
        <p class="subtitle">Use your balance to support our children</p>
        
        <div class="balance-display">
          <div>
            <div class="label">Your Available Balance</div>
            <div class="amount">R${currentBalance.toFixed(2)}</div>
          </div>
          <div>
            <a href="balance.html" class="link">Add Funds →</a>
          </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; background: #f8fafc; padding: 12px 16px; border-radius: 8px;">
          <div>
            <div style="font-size: 0.8rem; color: #64748b;">Total Donated</div>
            <div style="font-weight: 600;">R${totalDonated.toFixed(2)}</div>
          </div>
          <div style="text-align: right;">
            <div style="font-size: 0.8rem; color: #64748b;">Donations Made</div>
            <div style="font-weight: 600;">${donationCount}</div>
          </div>
        </div>
        
        <form id="donateForm">
          <div class="form-group">
            <label>Choose Donation Amount</label>
            <div class="amount-options">
              <button type="button" class="amount-btn" data-amount="10" ${currentBalance < 10 ? 'disabled' : ''}>R10</button>
              <button type="button" class="amount-btn" data-amount="25" ${currentBalance < 25 ? 'disabled' : ''}>R25</button>
              <button type="button" class="amount-btn" data-amount="50" ${currentBalance < 50 ? 'disabled' : ''}>R50</button>
              <button type="button" class="amount-btn" data-amount="100" ${currentBalance < 100 ? 'disabled' : ''}>R100</button>
              <button type="button" class="amount-btn" data-amount="250" ${currentBalance < 250 ? 'disabled' : ''}>R250</button>
              <button type="button" class="amount-btn" data-amount="500" ${currentBalance < 500 ? 'disabled' : ''}>R500</button>
            </div>
          </div>
          
          <div class="form-group">
            <label for="customAmount">Custom Amount</label>
            <input type="number" id="customAmount" placeholder="Enter any amount" step="0.01" min="1" max="${currentBalance}" />
          </div>
          
          <div id="insufficientFunds" class="insufficient-funds">
            Insufficient balance. Please <a href="balance.html" style="color: #f97316; font-weight: 500;">add funds</a> first.
          </div>
          
          <div class="form-group">
            <label for="message">Leave a Message (optional)</label>
            <textarea id="message" rows="3" placeholder="Write a message of hope..."></textarea>
          </div>
          
          <div id="successMessage" class="success-message"></div>
          <div id="errorMessage" class="error-message"></div>
          <div id="loadingSpinner" class="loading-spinner">Processing donation...</div>
          
          <button type="submit" class="btn btn-primary btn-block" id="donateSubmitBtn">
            Donate Now
          </button>
        </form>
        
        <div style="text-align: center; margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 20px;">
          <a href="balance.html" style="color: #f97316; font-weight: 500;">Manage Your Balance</a>
          <br />
          <a href="index.html" style="color: #64748b; font-size: 0.9rem; margin-top: 8px; display: inline-block;">← Back to Home</a>
        </div>
      `

      setupForm()
    }

    function setupForm() {
      const amountBtns = document.querySelectorAll('.amount-btn')
      const customAmount = document.getElementById('customAmount')
      const insufficientFunds = document.getElementById('insufficientFunds')
      
      amountBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.disabled) return
          amountBtns.forEach(b => b.classList.remove('selected'))
          btn.classList.add('selected')
          customAmount.value = ''
          insufficientFunds.style.display = 'none'
        })
      })

      customAmount.addEventListener('input', (e) => {
        if (e.target.value) {
          amountBtns.forEach(b => b.classList.remove('selected'))
          const amount = parseFloat(e.target.value)
          if (amount > currentBalance) {
            insufficientFunds.style.display = 'block'
          } else {
            insufficientFunds.style.display = 'none'
          }
        }
      })

      const form = document.getElementById('donateForm')
      const submitBtn = document.getElementById('donateSubmitBtn')
      const loadingSpinner = document.getElementById('loadingSpinner')
      const successMessage = document.getElementById('successMessage')
      const errorMessage = document.getElementById('errorMessage')
      
      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        
        let amount = 0
        const selectedBtn = document.querySelector('.amount-btn.selected')
        const customAmountValue = customAmount.value
        
        if (customAmountValue) {
          amount = parseFloat(customAmountValue)
        } else if (selectedBtn) {
          amount = parseFloat(selectedBtn.dataset.amount)
        }
        
        if (!amount || amount <= 0) {
          errorMessage.textContent = 'Please select or enter a donation amount.'
          errorMessage.style.display = 'block'
          return
        }

        if (amount > currentBalance) {
          errorMessage.textContent = 'Insufficient balance. Please add funds first.'
          errorMessage.style.display = 'block'
          return
        }
        
        const message = document.getElementById('message').value.trim()
        successMessage.style.display = 'none'
        errorMessage.style.display = 'none'
        loadingSpinner.classList.add('active')
        submitBtn.disabled = true
        submitBtn.textContent = 'Processing...'
        
        try {
          // Get donor's display name for the record
          const { data: profile } = await supabase
            .from('users')
            .select('display_name')
            .eq('id', currentUser.id)
            .single()

          const donorName = profile?.display_name || currentUser.email

          // Insert donation as NEGATIVE amount (this is a donation, spending money)
          const { error: insertError } = await supabase
            .from('donations')
            .insert({
              user_id: currentUser.id,
              user_email: currentUser.email,
              //donor_name: donorName,
              amount: -amount,  // NEGATIVE - this is a donation
              message: message || null,
              status: 'donation'
            })
          
          if (insertError) throw insertError
          
          // Update balance using RPC function (subtracts from balance)
          const { error: balanceError } = await supabase
            .rpc('update_balance', {
              p_user_id: currentUser.id,
              p_amount: -amount  // NEGATIVE amount to subtract from balance
            })
          
          if (balanceError) throw balanceError
          
          // Update local state
          currentBalance = currentBalance - amount
          totalDonated = totalDonated + amount
          donationCount = donationCount + 1
          
          successMessage.textContent = `Thank you for your generous donation of R${amount.toFixed(2)}!`
          successMessage.style.display = 'block'
          
          // Update balance display
          document.querySelector('.balance-display .amount').textContent = `R${currentBalance.toFixed(2)}`
          
          // Update stats
          const stats = document.querySelectorAll('.stats-grid .stat-value')
          document.querySelectorAll('.balance-display .amount')[0].textContent = `R${currentBalance.toFixed(2)}`
          
          // Reset form
          amountBtns.forEach(b => b.classList.remove('selected'))
          customAmount.value = ''
          document.getElementById('message').value = ''
          insufficientFunds.style.display = 'none'
          
          // Reload page to refresh all data after 2 seconds
          setTimeout(() => {
            window.location.reload()
          }, 2000)
          
          loadingSpinner.classList.remove('active')
          submitBtn.disabled = false
          submitBtn.textContent = 'Donate Now'
          
        } catch (error) {
          console.error('Donation error:', error)
          errorMessage.textContent = 'Failed to process donation. Please try again.'
          errorMessage.style.display = 'block'
          loadingSpinner.classList.remove('active')
          submitBtn.disabled = false
          submitBtn.textContent = 'Donate Now'
        }
      })
    }

    checkAuth()
  </script>
</body>
</html>
