<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - Hopeful Hearts</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-container {
      max-width: 400px;
      margin: 60px auto;
      padding: 32px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      background: #fff;
    }
    .auth-container h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .auth-container .subtitle { color: #64748b; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 4px; color: #0f172a; }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
    }
    .form-group input:focus { outline: 2px solid #f97316; border-color: transparent; }
    .btn-block { width: 100%; padding: 12px; margin-top: 8px; }
    .auth-link { text-align: center; margin-top: 16px; color: #64748b; }
    .auth-link a { color: #f97316; font-weight: 600; }
    .error-message { color: #ef4444; font-size: 0.9rem; margin-top: 8px; display: none; }
    .loading-spinner {
      display: none;
      text-align: center;
      margin-top: 12px;
      color: #64748b;
    }
    .loading-spinner.active { display: block; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h1>👋 Welcome Back</h1>
    <p class="subtitle">Sign in to your account</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>
      
      <div id="errorMessage" class="error-message"></div>
      <div id="loadingSpinner" class="loading-spinner">⏳ Signing in...</div>
      
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
    </form>
    
    <div class="auth-link">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
    <div class="auth-link" style="margin-top: 8px;">
      <a href="index.html" style="color: #64748b; font-size: 0.9rem;">← Back to Home</a>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
      }
    }
  </script>

  <script type="module">
    import { createClient } from '@supabase/supabase-js'

    const supabaseUrl = 'https://irzqdsxdiifosqzqdypj.supabase.co'
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyenFkc3hkaWlmb3NxenFkeXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTgwMjYsImV4cCI6MjA5ODk5NDAyNn0.2mzC2WjiVIN2imGfKh0aKhdP97PCT6eLsTxOS4lfbh0'
    const supabase = createClient(supabaseUrl, supabaseAnonKey)

    const form = document.getElementById('loginForm')
    const errorDiv = document.getElementById('errorMessage')
    const loadingSpinner = document.getElementById('loadingSpinner')
    const loginBtn = document.getElementById('loginBtn')

    const urlParams = new URLSearchParams(window.location.search)
    const returnUrl = urlParams.get('return') || 'index.html'

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      
      errorDiv.style.display = 'none'
      loadingSpinner.classList.add('active')
      loginBtn.disabled = true
      loginBtn.textContent = 'Signing in...'
      
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      
      if (!email || !password) {
        errorDiv.textContent = 'Please enter both email and password.'
        errorDiv.style.display = 'block'
        loadingSpinner.classList.remove('active')
        loginBtn.disabled = false
        loginBtn.textContent = 'Sign In'
        return
      }
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        })
        
        if (error) throw error
        
        window.location.href = returnUrl
        
      } catch (error) {
        errorDiv.textContent = error.message || 'Invalid email or password.'
        errorDiv.style.display = 'block'
        loadingSpinner.classList.remove('active')
        loginBtn.disabled = false
        loginBtn.textContent = 'Sign In'
      }
    })
  </script>
</body>
</html>
